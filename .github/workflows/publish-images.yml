name: Publish Docker Images

on:
  push:
    branches: [ main ]
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ toLower(github.repository_owner) }}/issue-tracker-webapp-web:${{ github.sha }},ghcr.io/${{ toLower(github.repository_owner) }}/issue-tracker-webapp-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ toLower(github.repository_owner) }}/issue-tracker-webapp-api:${{ github.sha }},ghcr.io/${{ toLower(github.repository_owner) }}/issue-tracker-webapp-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
