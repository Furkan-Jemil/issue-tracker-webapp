name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432
        env:
          POSTGRES_USER: issue_tracker
          POSTGRES_PASSWORD: issue_tracker
          POSTGRES_DB: issue_tracker
        options: >-
          --health-cmd "pg_isready -U issue_tracker -d issue_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://issue_tracker:issue_tracker@127.0.0.1:5432/issue_tracker?schema=public
      BETTER_AUTH_SECRET: test-secret
      AUTH_SECRET: test-secret
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U issue_tracker && break || sleep 2
          done
        env:
          PGPASSWORD: issue_tracker

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma schema
        run: npx prisma db push

      - name: Run tests
        run: npm test
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Lint
        if: ${{ always() }}
        run: |
          if npm run -s lint; then echo 'lint ok'; else echo 'no lint script'; fi
