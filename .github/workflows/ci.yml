name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Lint
        if: ${{ always() }}
        run: |
          if npm run -s lint; then echo 'lint ok'; else echo 'no lint script'; fi
