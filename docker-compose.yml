version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: issue-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: issue_tracker
      POSTGRES_USER: issue_tracker
      POSTGRES_PASSWORD: issue_tracker
    ports:
      - "5432:5432"
    volumes:
      - issue-tracker-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issue_tracker -d issue_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: issue-tracker-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://issue_tracker:issue_tracker@db:5432/issue_tracker?schema=public
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: change-me-to-a-long-random-secret
      AUTH_SECRET: change-me-to-a-long-random-secret
      BLOB_READ_WRITE_TOKEN: ""
      SKIP_DB_PUSH: "false"
    ports:
      - "3000:3000"
    volumes:
      - issue-tracker-uploads:/app/public/uploads

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: issue-tracker-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "server:start"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://issue_tracker:issue_tracker@db:5432/issue_tracker?schema=public
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: change-me-to-a-long-random-secret
      AUTH_SECRET: change-me-to-a-long-random-secret
      BLOB_READ_WRITE_TOKEN: ""
      SKIP_DB_PUSH: "true"
      WAIT_FOR_DB: "true"
    ports:
      - "4000:4000"

volumes:
  issue-tracker-db-data:
  issue-tracker-uploads:
